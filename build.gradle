plugins {
    id 'java'
    id 'com.gradleup.shadow' version "8.3.0"
}

group = 'carlisle.XServer'
version = '1.1'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    implementation 'net.minestom:minestom-server:1.21.11'
    implementation 'org.slf4j:slf4j-api:2.1.0-alpha1'
    implementation 'org.slf4j:slf4j-simple:2.0.0'
}

test {
    useJUnitPlatform()
}

jar {
    manifest {
        attributes(
                'Main-Class': 'carlisle.MiniServer.Main' // <-- adjust if different
        )
    }
}

shadowJar {
    mergeServiceFiles()
    archiveClassifier.set("") // no -all suffix
}

build {
    dependsOn(shadowJar)
}

sourceSets {
    main {
        resources {
            srcDirs = ['src/main/resources']
        }
    }
}
